<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Observer & Universe | 520</title>
    <style>
        body, html {
            margin: 0;
            padding: 0; width: 100%; height: 100%;
            background: #010102; overflow: hidden;
            font-family: 'Palatino Linotype', 'Book Antiqua', Palatino, serif;
            user-select: none;
            -webkit-user-select: none;
        }
        
        #canvas { display: block;
            width: 100%; height: 100%; opacity: 0; transition: opacity 2s; }
        
        #auth-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: radial-gradient(circle at center, #0a0d16 0%, #010102 100%);
            z-index: 100; transition: opacity 1.5s, visibility 1.5s;
        }
        .sys-text { color: #8c9bb4; font-size: 1rem; letter-spacing: 3px; margin-bottom: 30px; font-weight: 300;
        }
        .input-box {
            background: transparent;
            border: none; border-bottom: 1px solid #4a5d7e;
            color: #d0d5e0; font-size: 1.2rem; text-align: center; padding: 10px; width: 250px;
            font-family: inherit; outline: none;
            transition: border-color 0.3s;
        }
        .input-box:focus { border-bottom: 1px solid #e2c1c7;
        }
        #auth-msg { color: #e2c1c7; font-size: 0.85rem; margin-top: 20px; letter-spacing: 2px; height: 1.2rem;
            opacity: 0; transition: opacity 0.5s; }
        #btn-start {
            margin-top: 30px;
            padding: 10px 30px; background: transparent; border: 1px solid #8c9bb4;
            color: #8c9bb4; border-radius: 20px; cursor: pointer; letter-spacing: 2px; transition: all 0.3s;
        }
        #btn-start:hover { background: rgba(140, 155, 180, 0.1); color: #fff;
        }

        #ui-layer {
            position: absolute;
            bottom: 8%; width: 100%; text-align: center;
            pointer-events: none; display: flex; flex-direction: column; align-items: center; gap: 15px;
            z-index: 10;
        }
        #narrative {
            color: #d0d5e0;
            font-size: 1.05rem; letter-spacing: 3px; font-weight: 300;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.2); opacity: 0; transition: opacity 1.5s;
            height: 3.5rem; line-height: 1.6;
        }
        #hint {
            color: #8c9bb4;
            font-size: 0.85rem; letter-spacing: 4px; padding: 8px 20px;
            border: 1px solid rgba(140, 155, 180, 0.3); border-radius: 20px; opacity: 0;
            transition: opacity 1s; animation: pulse 2s infinite;
        }
        .highlight { color: #ffdae0;
            font-style: italic; font-weight: bold; font-size: 1.15rem; }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(140, 155, 180, 0.4);
            }
            70% { box-shadow: 0 0 0 10px rgba(140, 155, 180, 0);
            }
            100% { box-shadow: 0 0 0 0 rgba(140, 155, 180, 0);
            }
        }

        /* 照片画廊基础样式 */
        #photo-gallery {
            position: absolute;
            top: 45%; 
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 800px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            z-index: 50;
            pointer-events: none;
        }
        
        #photo-gallery img {
            flex: 1 1 calc(25% - 15px);
            max-width: calc(25% - 15px);
            min-width: 130px; 
            height: 150px;
            object-fit: cover;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(255, 218, 224, 0.2);
            opacity: 0;
            transform: translateY(30px) scale(0.95);
            transition: opacity 1s ease, transform 1s ease, box-shadow 0.3s, filter 0.3s;
        }

        /* 【新增】独占放映时的放大居中样式 */
        #photo-gallery img.previewing {
            position: fixed !important;
            top: 45% !important;
            left: 50% !important;
            transform: translate(-50%, -50%) scale(1.4) !important;
            max-width: 85vw !important;
            max-height: 55vh !important;
            width: auto !important;
            height: auto !important;
            object-fit: contain !important;
            opacity: 1 !important;
            z-index: 150 !important;
            box-shadow: 0 0 40px rgba(255, 218, 224, 0.85), 0 0 100px rgba(255, 255, 255, 0.3) !important;
            border: 2px solid rgba(255, 255, 255, 0.5);
            pointer-events: auto;
            transition: opacity 0.6s ease, transform 0.6s ease !important;
        }

        /* 最终照片墙排列展示状态（带错落悬浮动画） */
        #photo-gallery img.show-photo {
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: auto;
            animation: photoFloat 4s ease-in-out infinite alternate;
            animation-delay: calc(var(--i, 0) * 0.22s); /* 错开每张照片的浮动时间 */
        }

        /* 【新增】照片墙悬停互动渲染特效 */
        #photo-gallery img.show-photo:hover {
            transform: scale(1.1) translateY(-12px) rotate(1.5deg) !important;
            box-shadow: 0 15px 35px rgba(255, 218, 224, 0.7);
            filter: brightness(1.15) contrast(1.05);
            z-index: 60;
        }

        /* 照片微动悬浮特效 */
        @keyframes photoFloat {
            0% { transform: translateY(0px) rotate(0deg); box-shadow: 0 0 15px rgba(255, 218, 224, 0.2); }
            50% { transform: translateY(-5px) rotate(0.6deg); box-shadow: 0 0 25px rgba(255, 218, 224, 0.45); }
            100% { transform: translateY(0px) rotate(-0.6deg); box-shadow: 0 0 15px rgba(255, 218, 224, 0.2); }
        }

        /* 手机端适配 */
        @media (max-width: 600px) {
            #photo-gallery { top: 42%; gap: 10px; }
            #photo-gallery img {
                flex: 1 1 calc(50% - 10px);
                max-width: calc(50% - 10px);
                height: 110px;
            }
            #photo-gallery img.previewing {
                transform: translate(-50%, -50%) scale(1.2) !important;
                max-width: 90vw !important;
                max-height: 50vh !important;
            }
        }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="sys-text">宇宙终端锁定。请输入观测者主密钥：</div>
        <input type="text" id="passkey" class="input-box" placeholder="Input Key" autocomplete="off">
        <div id="auth-msg">提示信息</div>
        <button id="btn-start">引力初始化</button>
    </div>

    <canvas id="canvas"></canvas>
    
    <div id="ui-layer">
        <div id="narrative"></div>
        <div id="hint"></div>
    </div>

    <div id="photo-gallery">
        <img src="1.jpg" alt="合照1">
        <img src="2.jpg" alt="合照2">
        <img src="3.jpg" alt="合照3">
        <img src="4.jpg" alt="合照4">     
        <img src="5.jpg" alt="合照5">
        <img src="6.jpg" alt="合照6">
        <img src="7.jpg" alt="合照7">
        <img src="8.jpg" alt="合照8">
        <img src="9.jpg" alt="合照9">
        <img src="10.jpg" alt="合照10">
        <img src="11.jpg" alt="合照11">
        <img src="12.jpg" alt="合照12">
    </div>

  <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const authScreen = document.getElementById('auth-screen');
        const passkeyInput = document.getElementById('passkey');
        const authMsg = document.getElementById('auth-msg');
        const btnStart = document.getElementById('btn-start');
        const narrativeEl = document.getElementById('narrative');
        const hintEl = document.getElementById('hint');

        const PARTICLE_COUNT = 3200;
        const TRAIL_ALPHA = 0.16;
        let width, height;
        let particles = [];
        let textTargets = [];
        let mouse = { x: -1000, y: -1000 };
        let time = 0;
        let act = -1;
        let pressTimer1 = null;
        let pressTimer2 = null;

        const SCRIPT = [
            { text: "起初，我像一个在布朗运动中游走的孤立系统。", hint: "[ 滑动屏幕，扰动星云 ]" }, 
            { text: "直到你的引力场介入，打破了原本的对称性。", hint: "[ 持续按住屏幕，建立引力 ]" }, 
            { text: "我们如同宇宙中的双星系统，<br>捕获彼此的光芒，绕着共同的质心流转。", hint: "[ 双星已形成，请继续按住... ]" }, 
            { text: "在非线性的演化中，走向了奇妙的量子纠缠。", hint: "[ 轨道已锁定，请松开指尖 ]" }, 
            { text: "脱离外力后，引力波在同一频率下，产生了共振。", hint: "[ 请静静观赏 ]" }, 
            { text: "像非晶微丝的磁化反转一样，<br>即使撤去外场，你留下的剩磁也永不可逆。", hint: "" }, 
            { text: "我生性内敛，世界喧嚣。<br>但在你身边，就像画作里的一束暖光，安静且安心。", hint: "" }, 
            { text: "根据广义相对论，在接近事件视界的边缘...<br>时间由于极端的引力而产生膨胀、近乎停滞。", hint: "" }, 
            { text: "当这种思念的质量，超越了钱德拉塞卡极限...", hint: "[ 请点击发光奇点，触发爆发 ]" }, 
            { text: "在一场跨越光年的绚烂超新星爆发中...", hint: "" }, 
            { text: "所有的物理量，最终都不可逆地坍缩向你。<br><span class='highlight'>吴爽，520快乐。</span>", hint: "" } 
        ];

        btnStart.addEventListener('click', checkAuth);
        passkeyInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') checkAuth(); });

        function showAuthMsg(text, isError = true) {
            authMsg.style.color = isError ? '#e2c1c7' : '#8c9bb4';
            authMsg.innerText = text;
            authMsg.style.opacity = 1;
            setTimeout(() => { authMsg.style.opacity = 0; }, 3500);
        }

        function checkAuth() {
            const val = passkeyInput.value.trim();
            if (val === "王昊") {
                authScreen.style.opacity = 0;
                authScreen.style.visibility = 'hidden';
                canvas.style.opacity = 1;
                initUniverse();
            } else if (val === "吴爽" || val.toLowerCase() === "anya" || val === "阿尼亚") {
                showAuthMsg("那是宇宙中最珍视的恒星，唤醒系统需要输入观测者本人的名字哦。");
            } else {
                showAuthMsg("提示：那个总默默保护你，学物理，而且最喜欢你的人。");
            }
        }

        let uiTimeout = null;
        function updateUI(actIndex, overrideText = null) {
            if (actIndex < 0) return;
            narrativeEl.style.opacity = 0;
            hintEl.style.opacity = 0;
            if(uiTimeout) clearTimeout(uiTimeout);
            
            uiTimeout = setTimeout(() => {
                narrativeEl.innerHTML = overrideText || SCRIPT[actIndex].text;
                hintEl.innerText = SCRIPT[actIndex].hint;
                narrativeEl.style.opacity = 1;
                
                if (SCRIPT[actIndex].hint !== "") {
                    hintEl.style.display = 'block';
                    setTimeout(() => { hintEl.style.opacity = 1; }, 50);
                } else {
                    hintEl.style.display = 'none';
                }
            }, 1000);
        }

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            const dpr = window.devicePixelRatio || 1;
            canvas.width = width * dpr; canvas.height = height * dpr;
            ctx.scale(dpr, dpr);
            if(act >= 0) sampleTextCoordinates();
        }

        function sampleTextCoordinates() {
            const offscreen = document.createElement('canvas');
            const oCtx = offscreen.getContext('2d', { willReadFrequently: true });
            offscreen.width = width; offscreen.height = height;

            oCtx.fillStyle = 'white'; oCtx.textAlign = 'center';
            oCtx.textBaseline = 'middle';
            oCtx.font = 'bold 15vw "Palatino Linotype", Georgia, serif';
            oCtx.fillText('520', width / 2, height / 2 - 60);
            oCtx.font = 'italic 4.2vw "Palatino Linotype", Georgia, serif';
            oCtx.fillText('To Wu Shuang', width / 2, height / 2 + 90);
            const imageData = oCtx.getImageData(0, 0, width, height).data;
            textTargets = [];
            const step = Math.round(width / 350) + 2;
            for (let y = 0; y < height; y += step) {
                for (let x = 0; x < width; x += step) {
                    if (imageData[(y * width + x) * 4 + 3] > 128) {
                        textTargets.push({ x: x - width / 2, y: y - height / 2 });
                    }
                }
            }
            textTargets.sort(() => Math.random() - 0.5);
        }

        class Particle {
            constructor() {
                this.x = width / 2;
                this.y = height / 2;
                let bangAngle = Math.random() * Math.PI * 2;
                let bangSpeed = Math.random() * 30 + 5;
                this.vx = Math.cos(bangAngle) * bangSpeed;
                this.vy = Math.sin(bangAngle) * bangSpeed;
                this.baseRadius = Math.random() * 1.2 + 0.5;
                this.mathAngle = Math.random() * Math.PI * 2;
                this.mathSpeed = Math.random() * 0.02 + 0.01;
                this.dir = Math.random() > 0.5 ? 1 : -1;
                this.magneticTrack = Math.round(Math.random() * height / 30) * 30;
                this.hue = 210; this.targetHue = 210;
            }

            update(index) {
                if (act === 0) {
                    let dxM = this.x - mouse.x;
                    let dyM = this.y - mouse.y;
                    if (Math.sqrt(dxM*dxM + dyM*dyM) < 150) {
                        this.vx += (dxM/150) * 0.6;
                        this.vy += (dyM/150) * 0.6;
                    }
                    let angle = Math.sin(this.x*0.003 + time*0.01) * Math.cos(this.y*0.003 + time*0.01) * Math.PI * 2;
                    this.vx += Math.cos(angle) * 0.15; this.vy += Math.sin(angle) * 0.15;
                    this.vx *= 0.96; this.vy *= 0.96;
                    if (this.x < 0) this.x = width; if (this.x > width) this.x = 0;
                    if (this.y < 0) this.y = height; if (this.y > height) this.y = 0;
                    this.targetHue = 210;
                } else if (act === 1) {
                    let dx = mouse.x - this.x;
                    let dy = mouse.y - this.y;
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist > 1) {
                        let force = Math.min(2500 / (dist * dist), 2.0);
                        this.vx += (dx / dist) * force; this.vy += (dy / dist) * force;
                        this.vx += (-dy / dist) * 1.2; this.vy += (dx / dist) * 1.2;
                    }
                    this.vx *= 0.84; this.vy *= 0.84;
                    this.targetHue = 280; 
                } else if (act === 2) {
                    let R = Math.min(width, height) * 0.18;
                    let starAngle = time * 0.035;
                    let cx = mouse.x > 0 ? mouse.x : width/2;
                    let cy = mouse.y > 0 ? mouse.y : height/2;
                    let s1x = cx + R * Math.cos(starAngle);
                    let s1y = cy + R * Math.sin(starAngle);
                    let s2x = cx - R * Math.cos(starAngle);
                    let s2y = cy - R * Math.sin(starAngle);
                    let d1 = Math.max(Math.hypot(s1x - this.x, s1y - this.y), 1);
                    let d2 = Math.max(Math.hypot(s2x - this.x, s2y - this.y), 1);
                    let force1 = Math.min(1800 / (d1 * d1), 1.8);
                    let force2 = Math.min(1800 / (d2 * d2), 1.8);
                    this.vx += (s1x - this.x)/d1 * force1 + (s2x - this.x)/d2 * force2;
                    this.vy += (s1y - this.y)/d1 * force1 + (s2y - this.y)/d2 * force2;
                    this.vx += (- (s1y - this.y)/d1) * 0.9 * force1;
                    this.vy += (  (s1x - this.x)/d1) * 0.9 * force1;
                    this.vx += (- (s2y - this.y)/d2) * 0.9 * force2;
                    this.vy += (  (s2x - this.x)/d2) * 0.9 * force2;
                    this.vx *= 0.85; this.vy *= 0.85;
                    this.targetHue = (d1 < d2) ? 190 : 330;
                } else if (act === 3) {
                    this.mathAngle += this.mathSpeed * this.dir;
                    let scale = Math.min(width, height) * 0.35;
                    let sinT = Math.sin(this.mathAngle); let cosT = Math.cos(this.mathAngle);
                    let skewX = (mouse.x - width/2) * 0.3; let skewY = (mouse.y - height/2) * 0.3;
                    let baseX = (scale * cosT) / (1 + sinT * sinT);
                    let baseY = (scale * sinT * cosT) / (1 + sinT * sinT);
                    this.vx += ((width / 2 + baseX + (baseY/scale * skewX)) - this.x) * 0.08;
                    this.vy += ((height / 2 + baseY + (baseX/scale * skewY)) - this.y) * 0.08;
                    this.vx *= 0.82; this.vy *= 0.82;
                    this.targetHue = 310; 
                } else if (act === 4) {
                    this.mathAngle += this.mathSpeed * 0.5 * this.dir;
                    let heartScale = Math.min(width, height) / 45 * (1 + 0.08 * Math.sin(time * 0.15));
                    let t = this.mathAngle;
                    let hx = 16 * Math.pow(Math.sin(t), 3);
                    let hy = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
                    this.vx += ((width / 2 + hx * heartScale) - this.x) * 0.09;
                    this.vy += ((height / 2 - hy * heartScale - 20) - this.y) * 0.09;
                    this.vx *= 0.80; this.vy *= 0.80;
                    this.targetHue = 350; 
                } else if (act === 5) {
                    let targetX = this.x + Math.sin(time * 0.05 + this.y) * 2;
                    let targetY = this.magneticTrack; 
                    this.vx += (targetX - this.x) * 0.05;
                    this.vy += (targetY - this.y) * 0.05;
                    this.vx *= 0.80; this.vy *= 0.80;
                    this.targetHue = 220; 
                } else if (act === 6) {
                    this.vy -= 0.015;
                    this.vx += (Math.random() - 0.5) * 0.05;
                    this.vx *= 0.90; this.vy *= 0.90; 
                    if (this.y < 0) this.y = height;
                    this.targetHue = 40; 
                } else if (act === 7) {
                    let dx = width/2 - this.x;
                    let dy = height/2 - this.y;
                    let dist = Math.max(Math.hypot(dx, dy), 1);
                    this.vx += (dx/dist) * 1.5;
                    this.vy += (dy/dist) * 1.5;
                    this.vx += (-dy/dist) * 1.5; 
                    this.vy += (dx/dist) * 1.5;
                    this.vx *= 0.65; this.vy *= 0.65;
                    this.targetHue = 250; 
                } else if (act === 8) {
                    let dx = width/2 - this.x;
                    let dy = height/2 - this.y;
                    this.vx += dx * 0.15 + (-dy) * 0.3;
                    this.vy += dy * 0.15 + (dx) * 0.3;
                    this.vx *= 0.86; this.vy *= 0.86;
                    this.targetHue = 190;
                } else if (act === 9) {
                    this.vx *= 0.985; this.vy *= 0.985; 
                    if (this.x < 0) this.x = width; if (this.x > width) this.x = 0;
                    if (this.y < 0) this.y = height; if (this.y > height) this.y = 0;
                    this.targetHue = 30;
                } else if (act === 10) {
                    let target = textTargets[index % textTargets.length];
                    this.vx += ((width / 2 + target.x) - this.x) * 0.035;
                    this.vy += ((height / 2 + target.y) - this.y) * 0.035;
                    this.vx *= 0.82; this.vy *= 0.82;
                    this.targetHue = 340;
                }

                let maxSpeedSq = (act === 9) ? 3500 : (act === 1 || act === 2 ? 900 : (act === 6 || act === 7 ? 6 : 400));
                let speedSq = this.vx*this.vx + this.vy*this.vy;
                if (speedSq > maxSpeedSq) {
                    let ratio = Math.sqrt(maxSpeedSq / speedSq);
                    this.vx *= ratio; this.vy *= ratio;
                }

                this.x += this.vx;
                this.y += this.vy;
                this.hue += (this.targetHue - this.hue) * 0.04;
            }

            draw() {
                let speed = Math.sqrt(this.vx*this.vx + this.vy*this.vy);
                let dynamicRadius = this.baseRadius + speed * 0.03;
                
                if (act === 6) dynamicRadius = this.baseRadius * 1.5;
                if (act === 7) dynamicRadius = this.baseRadius * 1.2;
                
                let alpha = 0.5 + speed * 0.03;
                if (act === 0 && time < 80) alpha = 0.9; 
                if (act === 5) alpha = 0.6;
                if (act === 6) alpha = 0.35; 
                if (act === 7) alpha = 0.45;
                if (act === 8) alpha = 0.8;
                if (act === 9) alpha = 0.7; 
                
                ctx.fillStyle = `hsla(${this.hue}, 80%, 65%, ${alpha})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, dynamicRadius, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function initUniverse() {
            act = 0;
            resize(); particles = [];
            for (let i = 0; i < PARTICLE_COUNT; i++) particles.push(new Particle());
            updateUI(0); animate();
            
            window.addEventListener('mousedown', handlePointerDown);
            window.addEventListener('touchstart', (e) => { handlePointerDown(e); }, {passive: false});
            window.addEventListener('mousemove', updateMousePos);
            window.addEventListener('touchmove', (e) => { updateMousePos(e); }, {passive: false});
            window.addEventListener('mouseup', handlePointerUp);
            window.addEventListener('touchend', handlePointerUp);
        }

        function animate() {
            if(act < 0) return;
            time++;
            
            let bgAlpha = TRAIL_ALPHA;
            if (act === 5) bgAlpha = 0.05; 
            if (act === 6) bgAlpha = 0.2;
            if (act === 7) bgAlpha = 0.1; 
            if (act === 8) bgAlpha = 0.3;
            if (act === 9 && time % 100 < 10) bgAlpha = 0.05; 
            
            let bgColor = act === 6 ? `rgba(15, 12, 8, ${bgAlpha})` : `rgba(3, 4, 8, ${bgAlpha})`;
            
            ctx.globalCompositeOperation = 'source-over';
            ctx.fillStyle = bgColor;
            ctx.fillRect(0, 0, width, height);
            ctx.globalCompositeOperation = 'lighter';
            
            for (let i = 0; i < particles.length; i++) {
                particles[i].update(i);
                particles[i].draw();
            }
            requestAnimationFrame(animate);
        }

        function handlePointerDown(e) {
            updateMousePos(e);
            if (act === 0) {
                act = 1;
                updateUI(1);
                pressTimer1 = setTimeout(() => { 
                    act = 2; updateUI(2); 
                    pressTimer2 = setTimeout(() => {
                        act = 3; updateUI(3);
                    }, 3500);
                }, 3000);
            } 
            else if (act === 8) {
                act = 9;
                updateUI(9); 
                particles.forEach(p => {
                    let explodeAngle = Math.random() * Math.PI * 2;
                    let explodeSpeed = Math.random() * 45 + 15;
                    p.vx = Math.cos(explodeAngle) * explodeSpeed;
                    p.vy = Math.sin(explodeAngle) * explodeSpeed;
                });
                setTimeout(() => { 
                    act = 10; 
                    updateUI(10); 
                    setTimeout(showPhotos, 3500); 
                }, 2000);
            }
        }

        function handlePointerUp(e) {
            if (act === 1) {
                clearTimeout(pressTimer1);
                clearTimeout(pressTimer2); act = 0;
                updateUI(0, "引力场不足，退回孤立系统。<br><span style='font-size:0.9rem; color:#8c9bb4'>（请保持耐心，持续注入引力）</span>"); 
            } else if (act === 2) {
                clearTimeout(pressTimer2);
                act = 0;
                updateUI(0, "引力未能锁定双星轨道，星系解体。<br><span style='font-size:0.9rem; color:#8c9bb4'>（感情需要更久一点的坚持哦...）</span>"); 
            } else if (act === 3) {
                act = 4;
                updateUI(4); 
                
                setTimeout(() => { 
                    act = 5; updateUI(5); 
                    mouse = {x: -1000, y: -1000}; 
                }, 4000);
                setTimeout(() => { act = 6; updateUI(6); }, 8500);
                setTimeout(() => { act = 7; updateUI(7); }, 13500);
                setTimeout(() => { act = 8; updateUI(8); }, 18000);
            }
        }

        function updateMousePos(e) {
            if (e.touches && e.touches.length > 0) { 
                mouse.x = e.touches[0].clientX;
                mouse.y = e.touches[0].clientY; 
            } 
            else { 
                mouse.x = e.clientX;
                mouse.y = e.clientY; 
            }
        }

        window.addEventListener('resize', () => { if(act >= 0) resize(); });

        // 【核心修改】优雅的时间轴延迟控制函数
        const sleep = ms => new Promise(res => setTimeout(res, ms));

        // 【重写】照片放映与高级照片墙特效函数
        async function showPhotos() {
            const gallery = document.getElementById('photo-gallery');
            const images = gallery.querySelectorAll('img');
            
            // 让背景粒子显著变暗变模糊，完美突出单独放映中的照片
            canvas.style.transition = 'filter 3s, opacity 3s';
            canvas.style.filter = 'blur(6px) brightness(0.35)';

            // 第一阶段：单张照片独占大屏轮流放映
            for (let i = 0; i < images.length; i++) {
                const img = images[i];
                img.classList.add('previewing');
                await sleep(2200); // 每张照片在中央放大展示 2.2 秒
                img.classList.remove('previewing');
                await sleep(400);  // 渐隐淡出的间歇
            }

            // 放映结束后，恢复画布稍微亮一点，准备迎接合拢的照片墙
            canvas.style.filter = 'blur(4px) brightness(0.55)';

            // 第二阶段：将所有照片优雅地聚合排列在一起
            images.forEach((img, index) => {
                // 将序列赋给 CSS 变量，用以在 CSS 动画中创造出错落的呼吸感
                img.style.setProperty('--i', index);
                setTimeout(() => {
                    img.classList.add('show-photo');
                }, index * 250); // 每隔 0.25 秒聚拢浮现一张
            });
        }
    </script>
</body>
